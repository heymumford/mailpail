name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - uses: extractions/setup-just@v2
      - run: uv sync --all-extras
      - run: just lint

  test-a:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - uses: extractions/setup-just@v2
      - run: uv sync --all-extras
      - run: just test-a
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-a-results-${{ matrix.os }}-py${{ matrix.python-version }}
          path: reports/

  test-b:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - uses: extractions/setup-just@v2
      - run: uv sync --all-extras
      - run: just test-b
